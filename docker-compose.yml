version: '3.8'

# ═══════════════════════════════════════════════════════════════════════════════
# docker-compose.yml — Cafeteria com Observabilidade e Resiliência (Aula 11)
#
# Containers adicionados em relação à versão original:
#   redis     → storage de métricas Prometheus + estado do Circuit Breaker
#   prometheus → coleta /metrics.php a cada 15s
#   grafana   → dashboards com PromQL (taxa de pedidos, latência P95, etc.)
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── Aplicação PHP (Cafeteria) ───────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: cafeteria_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - ./logs:/var/www/html/logs
    environment:
      DB_HOST:     db
      DB_USER:     cafeteria
      DB_PASS:     cafeteria123
      DB_NAME:     Cafeteria
      REDIS_HOST:  redis
      REDIS_PORT:  6379
      APP_ENV:     production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Health Check do container — usa o endpoint /health.php (liveness)
    # Equivalente ao HEALTHCHECK do Dockerfile + liveness probe do Kubernetes
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health.php?live=1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - cafeteria_network

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: cafeteria_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       Cafeteria
      POSTGRES_USER:     cafeteria
      POSTGRES_PASSWORD: cafeteria123
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafeteria -d Cafeteria"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cafeteria_network

  # ── Redis — Cache + Pub/Sub + Storage de Métricas + Circuit Breaker ─────────
  # Mesmo Redis já usado pelo projeto, agora também serve como:
  #   - Storage do promphp (métricas stateless do PHP)
  #   - Storage do Circuit Breaker (estado compartilhado entre containers)
  redis:
    image: redis:7-alpine
    container_name: cafeteria_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cafeteria_network

  # ── pgAdmin ─────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cafeteria_pgadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@cafeteria.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      - db
    networks:
      - cafeteria_network

  # ── Prometheus — coleta /metrics.php a cada 15s ─────────────────────────────
  # Idêntico ao container da Aula 11 (GestaoPedidos), apenas target diferente
  prometheus:
    image: prom/prometheus:latest
    container_name: cafeteria_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
    depends_on:
      - app
    networks:
      - cafeteria_network

  # ── Grafana — dashboards com PromQL ─────────────────────────────────────────
  # Idêntico ao container da Aula 11, com datasource e dashboard provisionados
  grafana:
    image: grafana/grafana:latest
    container_name: cafeteria_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: cafeteria123
      GF_USERS_ALLOW_SIGN_UP:     false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - cafeteria_network

volumes:
  db_data:
  redis_data:
  prometheus_data:
  grafana_data:
  vendor_data:

networks:
  cafeteria_network:
    driver: bridge
